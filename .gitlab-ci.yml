# Build the Vite app and deploy to GitLab Pages.
# Vite must be configured with base: './' or the project path for Pages.
stages:
  - build
  - test
  - deploy

variables:
  LHCI_BUILD_CONTEXT__CURRENT_HASH: ${CI_COMMIT_SHA}
  LHCI_BUILD_CONTEXT__COMMIT_MESSAGE: ${CI_COMMIT_MESSAGE}
  LHCI_BUILD_CONTEXT__AUTHOR: ${CI_COMMIT_AUTHOR}
  LHCI_BUILD_CONTEXT__BRANCH: ${CI_COMMIT_BRANCH}

build:
  stage: build
  image: node:20
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
  script:
    - npm install
    - npm run build
  artifacts:
    paths:
      - dist/
  rules:
    - if: $CI_COMMIT_BRANCH

lighthouse:
  stage: test
  image: node:20
  dependencies:
    - build
  script:
    # Install Lighthouse CI globally (CI tool, not a project dep)
    - npm install -g @lhci/cli
    - lhci autorun
  artifacts:
    paths:
      - .lighthouseci/
    when: always
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_MERGE_REQUEST_IID

pages:
  stage: deploy
  image: node:20
  dependencies:
    - build
  script:
    - mkdir -p public
    - cp -r dist/* public/
    # SPA fallback: serve index.html for all routes (GitLab Pages 404 trick)
    - cp public/index.html public/404.html
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
